# Fly.io — https://fly.io
# fly launch  (or fly apps create pitch-intel && fly deploy)
app = "pitch-intel"
primary_region = "nrt"

[build]

[http_service]
  internal_port = 8866
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
