name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci || npm install

      - name: Start server
        run: |
          npm start &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8866/api/health >/dev/null; then
              echo "Server up"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          exit 1
        env:
          PORT: "8866"
          HOST: "127.0.0.1"
          DATA_PROVIDER: espn

      - name: Health check
        run: |
          curl -sf http://127.0.0.1:8866/api/health | tee /tmp/health.json
          grep -q '"ok":true' /tmp/health.json || grep -q '"ok": true' /tmp/health.json

      - name: Analyze demo
        run: |
          curl -sf -X POST http://127.0.0.1:8866/api/analyze \
            -H "Content-Type: application/json" \
            -d '{"matchId":"demo","withAi":false}' | tee /tmp/analyze.json
          grep -q 'finalScore' /tmp/analyze.json
          grep -q 'analysts' /tmp/analyze.json

      - name: Static assets
        run: |
          curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:8866/ | grep -q 200
          curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:8866/js/app.js | grep -q 200
          curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:8866/js/i18n.js | grep -q 200
